<!DOCTYPE html>
<html lang="tr" class="transition-all duration-700">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Coding Veri Merkezi 🇹🇷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.getItem('adminKey') !== 'EFE_PRO_SECRET') window.location.href = 'login.html';
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen">

<div class="max-w-[1400px] mx-auto py-8 px-4">
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 p-6 bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl border border-white dark:border-slate-700 gap-4">
        <div>
            <h1 class="text-3xl font-black bg-gradient-to-r from-red-600 to-red-400 bg-clip-text text-transparent">Coding Veri 🇹🇷</h1>
            <p class="text-slate-400 font-medium">Türkiye Yerel Veri Yönetim Sistemi</p>
        </div>
        <div class="flex gap-3">
            <button onclick="excelIndir()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-2xl shadow-lg font-bold transition active:scale-95 flex items-center gap-2">
                <i class="fa fa-file-excel"></i> Excel
            </button>
            <button onclick="toggleDarkMode()" id="darkBtn" class="w-12 h-12 flex items-center justify-center bg-slate-100 dark:bg-slate-700 rounded-2xl shadow-inner transition hover:rotate-12 border border-transparent dark:border-slate-600">
                <i class="fa fa-moon text-xl dark:text-yellow-400"></i>
            </button>
            <button onclick="cikisYap()" class="bg-red-600 hover:bg-red-700 text-white px-5 py-2 rounded-2xl shadow-lg font-bold transition active:scale-95 flex items-center gap-2">
                <i class="fa fa-power-off"></i> Çıkış
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-xl flex items-center gap-5 border border-white dark:border-slate-700">
            <div class="w-14 h-14 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-2xl flex items-center justify-center text-2xl">👥</div>
            <div><p class="text-xs text-slate-400 font-bold">TOPLAM VATANDAŞ</p><h3 id="statTotal" class="text-3xl font-black">0</h3></div>
        </div>
        <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-xl flex items-center gap-5 border border-white dark:border-slate-700">
            <div class="w-14 h-14 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 rounded-2xl flex items-center justify-center text-2xl">📈</div>
            <div><p class="text-xs text-slate-400 font-bold">BUGÜN GELEN KAYIT</p><h3 id="statToday" class="text-3xl font-black">0</h3></div>
        </div>
        
        <div onclick="tumSehirleriGoster()" class="md:col-span-2 bg-white dark:bg-slate-800 p-6 rounded-[2.5rem] shadow-xl border border-white dark:border-slate-700 cursor-pointer hover:border-red-500 hover:shadow-red-500/20 transition-all group relative">
            <div class="flex justify-between items-center mb-2">
                <h4 class="text-sm font-bold flex items-center gap-2 text-slate-400 group-hover:text-red-500 transition"><i class="fa fa-chart-bar"></i> ŞEHİR DAĞILIMI</h4>
                <span class="text-xs font-bold bg-red-100 text-red-600 px-3 py-1 rounded-full"><i class="fa fa-hand-pointer mr-1"></i>Tümünü Gör</span>
            </div>
            <div class="h-[100px] w-full"><canvas id="cityChart"></canvas></div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4">
            <div class="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl border border-white dark:border-slate-700 sticky top-10">
                <h3 id="formBaslik" class="text-2xl font-bold mb-6">✨ Vatandaş Kaydı</h3>
                <input type="hidden" id="editId">
                <div class="space-y-4">
                    <input type="text" id="isim" placeholder="Ad Soyad" class="w-full p-4 bg-slate-50 dark:bg-slate-700 rounded-2xl outline-none focus:ring-4 focus:ring-red-500/20 text-slate-800 dark:text-white">
                    <input type="email" id="email" placeholder="E-posta Adresi" class="w-full p-4 bg-slate-50 dark:bg-slate-700 rounded-2xl outline-none focus:ring-4 focus:ring-red-500/20 text-slate-800 dark:text-white">
                    
                    <select id="sehirSec" class="w-full p-4 bg-slate-50 dark:bg-slate-700 rounded-2xl outline-none text-slate-800 dark:text-white cursor-pointer"></select>

                    <input type="text" id="telefon" oninput="telefonMaskele(this)" placeholder="(5XX) XXX XX XX" class="w-full p-4 bg-slate-100 dark:bg-slate-900/50 rounded-2xl outline-none font-mono text-lg text-slate-800 dark:text-white">
                    
                    <button id="btnEkle" onclick="ekle()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl shadow-xl transition active:scale-95">Sisteme İşle</button>
                    <button id="btnGuncelle" onclick="kaydet()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl shadow-xl hidden transition active:scale-95">Güncelle</button>
                    <button onclick="formuTemizle()" id="btnVazgec" class="w-full text-slate-400 hidden mt-2 text-sm hover:text-red-500">İptal Et</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-4">
            <div class="bg-white dark:bg-slate-800 p-4 rounded-3xl shadow-xl flex items-center group">
                <i class="fa fa-search text-slate-300 mx-5 text-xl group-focus-within:text-red-500"></i>
                <input type="text" id="aramaInput" oninput="listele()" placeholder="İsim, mail veya şehre göre ara..." class="w-full bg-transparent outline-none text-xl text-slate-800 dark:text-white">
            </div>
            <div id="liste" class="grid gap-4"></div>
        </div>
    </div>
</div>

<script>
    const url = 'http://localhost:3000/api/kullanicilar';
    let myChart;
    let mevcutVeri = [];
    let tumSehirIstatistikleri = []; // Tüm şehirleri tutacağımız hafıza

    const sehirler = ["Adana", "Adıyaman", "Afyonkarahisar", "Ağrı", "Aksaray", "Amasya", "Ankara", "Antalya", "Ardahan", "Artvin", "Aydın", "Balıkesir", "Bartın", "Batman", "Bayburt", "Bilecik", "Bingöl", "Bitlis", "Bolu", "Burdur", "Bursa", "Çanakkale", "Çankırı", "Çorum", "Denizli", "Diyarbakır", "Düzce", "Edirne", "Elazığ", "Erzincan", "Erzurum", "Eskişehir", "Gaziantep", "Giresun", "Gümüşhane", "Hakkari", "Hatay", "Iğdır", "Isparta", "İstanbul", "İzmir", "Kahramanmaraş", "Karabük", "Karaman", "Kars", "Kastamonu", "Kayseri", "Kırıkkale", "Kırklareli", "Kırşehir", "Kilis", "Kocaeli", "Konya", "Kütahya", "Malatya", "Manisa", "Mardin", "Mersin", "Muğla", "Muş", "Nevşehir", "Niğde", "Ordu", "Osmaniye", "Rize", "Sakarya", "Samsun", "Siirt", "Sinop", "Sivas", "Şanlıurfa", "Şırnak", "Tekirdağ", "Tokat", "Trabzon", "Tunceli", "Uşak", "Van", "Yalova", "Yozgat", "Zonguldak"];
    
    window.onload = () => {
        const sehirSelect = document.getElementById('sehirSec');
        sehirler.forEach(sehir => sehirSelect.innerHTML += `<option value="${sehir}">${sehir}</option>`);
        sehirSelect.value = "İstanbul"; 
        if(localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        listele();
    };

    function telefonMaskele(input) {
        let v = input.value.replace(/\D/g, '');
        let x = v.match(/(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
        input.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? ' ' + x[3] : '') + (x[4] ? ' ' + x[4] : '');
    }

    async function istatistikGuncelle() {
        try {
            const res = await fetch('http://localhost:3000/api/stats/tr');
            const data = await res.json();
            
            document.getElementById('statTotal').innerText = data.total || 0;
            document.getElementById('statToday').innerText = data.today || 0;
            
            tumSehirIstatistikleri = data.cityStats; // Modal için hafızaya al
            const chartIcinIlk5 = data.cityStats.slice(0, 5); // Grafik için sadece ilk 5'i ayır

            const ctx = document.getElementById('cityChart').getContext('2d');
            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartIcinIlk5.map(s => s.sehir),
                    datasets: [{
                        label: 'Kayıt',
                        data: chartIcinIlk5.map(s => s.count),
                        backgroundColor: '#ef4444',
                        borderRadius: 5
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        } catch(e) { console.log(e); }
    }

    // 🔥 TÜM ŞEHİRLERİ GÖSTEREN POPUP
    function tumSehirleriGoster() {
        if(tumSehirIstatistikleri.length === 0) {
            return Swal.fire('Bilgi', 'Henüz şehirlere ait veri yok.', 'info');
        }

        let listeHTML = '<div class="grid grid-cols-2 md:grid-cols-3 gap-3 text-left max-h-[400px] overflow-y-auto p-2">';
        tumSehirIstatistikleri.forEach(s => {
            listeHTML += `<div class="bg-slate-100 dark:bg-slate-700 p-3 rounded-xl border border-slate-200 dark:border-slate-600 flex justify-between items-center shadow-sm">
                <span class="font-bold text-slate-700 dark:text-slate-200">${s.sehir}</span>
                <span class="bg-red-500 text-white text-xs font-black px-2 py-1 rounded-lg">${s.count}</span>
            </div>`;
        });
        listeHTML += '</div>';

        Swal.fire({
            title: '<h3 class="text-2xl font-black text-slate-800 dark:text-white mb-2">Tüm Şehir Dağılımı 🇹🇷</h3>',
            html: listeHTML,
            width: '800px',
            background: localStorage.getItem('theme') === 'dark' ? '#1e293b' : '#ffffff',
            showConfirmButton: true,
            confirmButtonText: 'Kapat',
            confirmButtonColor: '#ef4444'
        });
    }

    async function listele() {
        const q = document.getElementById('aramaInput').value;
        const res = await fetch(`${url}?q=${q}`);
        const data = await res.json();
        mevcutVeri = data.veri;
        
        const kapsayici = document.getElementById('liste');
        kapsayici.innerHTML = data.veri.length === 0 ? '<div class="text-center py-10 opacity-50">Kayıt Bulunamadı.</div>' : '';
        
        data.veri.forEach(k => {
            kapsayici.innerHTML += `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-xl flex justify-between items-center border border-transparent hover:border-red-500 transition-all">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 bg-red-600 text-white rounded-2xl flex items-center justify-center font-black text-xl shadow-lg">${k.isim.charAt(0).toUpperCase()}</div>
                        <div>
                            <h4 class="font-bold text-xl">${k.isim}</h4>
                            <div class="flex flex-wrap gap-4 text-sm text-slate-500 dark:text-slate-400 font-medium mt-1">
                                <span><i class="fa fa-envelope mr-1"></i> ${k.email}</span>
                                <span><i class="fa fa-phone mr-1"></i> ${k.telefon || 'Yok'}</span>
                                <span class="text-red-500"><i class="fa fa-map-marker-alt mr-1"></i> ${k.sehir || 'Belirtilmedi'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="duzenle(${k.id}, '${k.isim}', '${k.email}', '${k.telefon || ''}', '${k.sehir || ''}')" class="text-indigo-500 p-3 hover:bg-indigo-50 dark:hover:bg-slate-700 rounded-xl transition"><i class="fa fa-pen"></i></button>
                        <button onclick="sil(${k.id})" class="text-red-500 p-3 hover:bg-red-50 dark:hover:bg-slate-700 rounded-xl transition"><i class="fa fa-trash"></i></button>
                    </div>
                </div>`;
        });
        istatistikGuncelle();
    }

    async function ekle() {
        const isim = document.getElementById('isim').value;
        const email = document.getElementById('email').value;
        const telefon = document.getElementById('telefon').value;
        const sehir = document.getElementById('sehirSec').value;

        if(!isim || !email) return Swal.fire('Hata', 'İsim ve E-posta zorunlu!', 'error');

        await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({isim, email, telefon, sehir}) });
        formuTemizle(); listele(); Swal.fire({ icon: 'success', title: 'Kaydedildi', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
    }

    function duzenle(id, isim, email, tel, sehir) {
        document.getElementById('editId').value = id; document.getElementById('isim').value = isim; document.getElementById('email').value = email;
        document.getElementById('telefon').value = tel; document.getElementById('sehirSec').value = sehir || 'İstanbul';
        
        document.getElementById('formBaslik').innerText = "📝 Kaydı Güncelle";
        document.getElementById('btnEkle').classList.add('hidden'); document.getElementById('btnGuncelle').classList.remove('hidden');
        document.getElementById('btnVazgec').classList.remove('hidden'); window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function kaydet() {
        const id = document.getElementById('editId').value;
        await fetch(`${url}/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ isim: document.getElementById('isim').value, email: document.getElementById('email').value, telefon: document.getElementById('telefon').value, sehir: document.getElementById('sehirSec').value }) });
        formuTemizle(); listele(); Swal.fire('Başarılı', 'Kayıt güncellendi!', 'success');
    }

    async function sil(id) { if (confirm('Silmek istediğine emin misin?')) { await fetch(`${url}/${id}`, { method: 'DELETE' }); listele(); } }
    
    function formuTemizle() {
        document.getElementById('isim').value = ''; document.getElementById('email').value = ''; document.getElementById('telefon').value = '';
        document.getElementById('sehirSec').value = 'İstanbul'; document.getElementById('formBaslik').innerText = "✨ Vatandaş Kaydı";
        document.getElementById('btnEkle').classList.remove('hidden'); document.getElementById('btnGuncelle').classList.add('hidden'); document.getElementById('btnVazgec').classList.add('hidden');
    }

    function excelIndir() {
        if (mevcutVeri.length === 0) return Swal.fire('Hata', 'İndirilecek veri yok!', 'error');
        const ws = XLSX.utils.json_to_sheet(mevcutVeri); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Coding_Veri"); XLSX.writeFile(wb, "Coding_Veri_Rapor.xlsx");
    }

    function cikisYap() { localStorage.removeItem('adminKey'); window.location.href = 'login.html'; }
    function toggleDarkMode() {
        document.documentElement.classList.toggle('dark'); const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light'); document.getElementById('darkBtn').innerHTML = isDark ? '<i class="fa fa-sun text-yellow-400 text-xl"></i>' : '<i class="fa fa-moon text-xl"></i>';
    }
</script>
</body>
</html>
